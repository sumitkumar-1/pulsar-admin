server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: pulsar-admin-api
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pulsar_admin}
    username: ${APP_DATASOURCE_USERNAME:pulsar}
    password: ${APP_DATASOURCE_PASSWORD:pulsar}
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:schema.sql

app:
  pulsar:
    gateway-mode: ${APP_PULSAR_GATEWAY_MODE:rest}
    admin-rest-connect-timeout-ms: ${APP_PULSAR_ADMIN_REST_CONNECT_TIMEOUT_MS:3000}
    admin-rest-read-timeout-ms: ${APP_PULSAR_ADMIN_REST_READ_TIMEOUT_MS:5000}
    inventory-sync-concurrency: ${APP_PULSAR_INVENTORY_SYNC_CONCURRENCY:8}
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://127.0.0.1:4200
      - http://localhost:5173
      - http://127.0.0.1:5173
