@if (open) {
  <div class="dialog-shell" (click)="cancel.emit()">
    <section class="dialog-card" (click)="$event.stopPropagation()">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">Environment Setup</p>
          <h3>{{ editing ? 'Edit environment' : 'Add environment' }}</h3>
          <p class="dialog-copy">
            Capture the connection details needed to test, sync, and browse this Pulsar environment from the console.
          </p>
        </div>
        <button class="close-button" type="button" (click)="cancel.emit()">Close</button>
      </div>

      <form class="environment-form" [formGroup]="form" (ngSubmit)="save.emit()">
        <label [ngClass]="{ invalid: isInvalid('id') }">
          <span>Environment ID</span>
          <input formControlName="id" type="text" placeholder="dev-eu" />
          @if (isInvalid('id')) {
            <small>Use 2-32 lowercase letters, numbers, or dashes.</small>
          }
        </label>

        <label [ngClass]="{ invalid: isInvalid('name') }">
          <span>Name</span>
          <input formControlName="name" type="text" placeholder="Development EU" />
          @if (isInvalid('name')) {
            <small>A clear environment name is required.</small>
          }
        </label>

        <label [ngClass]="{ invalid: isInvalid('kind') }">
          <span>Kind</span>
          <select formControlName="kind">
            <option value="prod">Prod</option>
            <option value="stable">Stable</option>
            <option value="qa">QA</option>
            <option value="dev">Dev</option>
            <option value="local">Local</option>
          </select>
        </label>

        <label [ngClass]="{ invalid: isInvalid('region') }">
          <span>Region</span>
          <input formControlName="region" type="text" placeholder="us-east-1" />
          @if (isInvalid('region')) {
            <small>Region is required.</small>
          }
        </label>

        <label [ngClass]="{ invalid: isInvalid('clusterLabel') }">
          <span>Cluster label</span>
          <input formControlName="clusterLabel" type="text" placeholder="cluster-dev" />
          @if (isInvalid('clusterLabel')) {
            <small>Cluster label is required.</small>
          }
        </label>

        <label class="full-width" [ngClass]="{ invalid: isInvalid('summary') }">
          <span>Summary</span>
          <input formControlName="summary" type="text" placeholder="Daily engineering workflows" />
          @if (isInvalid('summary')) {
            <small>Give operators a short description of this environment.</small>
          }
        </label>

        <label class="full-width" [ngClass]="{ invalid: isInvalid('brokerUrl') }">
          <span>Broker URL</span>
          <input formControlName="brokerUrl" type="text" placeholder="pulsar://dev-brokers:6650" />
          @if (isInvalid('brokerUrl')) {
            <small>Broker URL is required.</small>
          }
        </label>

        <label class="full-width" [ngClass]="{ invalid: isInvalid('adminUrl') }">
          <span>Admin URL</span>
          <input formControlName="adminUrl" type="text" placeholder="https://dev-admin.internal" />
          @if (isInvalid('adminUrl')) {
            <small>Admin URL is required.</small>
          }
        </label>

        <label [ngClass]="{ invalid: isInvalid('authMode') }">
          <span>Auth mode</span>
          <select formControlName="authMode">
            <option value="none">None</option>
            <option value="token">Token</option>
            <option value="basic">Basic</option>
            <option value="mtls">mTLS</option>
          </select>
        </label>

        <label>
          <span>Credential reference</span>
          <input formControlName="credentialReference" type="text" [placeholder]="authMode() === 'token' ? 'env://PULSAR_TOKEN' : 'username:password'" />
          <small>{{ credentialHint() }}</small>
        </label>

        <label class="full-width" [ngClass]="{ invalid: isInvalid('syncTargets') }">
          <span>Scoped sync targets</span>
          <textarea
            formControlName="syncTargets"
            rows="4"
            placeholder="team-a/payments&#10;team-a/orders"></textarea>
          <small>
            Optional. Use one tenant or tenant/namespace per line when the token cannot list all tenants. Example:
            <code>team-a</code> or <code>team-a/payments</code>.
          </small>
          @if (isInvalid('syncTargets')) {
            <small>Scoped sync targets must be 2000 characters or less.</small>
          }
        </label>

        <label class="checkbox-row">
          <input formControlName="tlsEnabled" type="checkbox" />
          <span>TLS enabled</span>
        </label>

        <div class="form-actions">
          <button class="ghost-button" type="button" (click)="cancel.emit()">Cancel</button>
          <button class="primary-button" type="submit" [disabled]="saving">
            {{ saving ? 'Saving...' : (editing ? 'Save changes' : 'Create environment') }}
          </button>
        </div>
      </form>
    </section>
  </div>
}
