services:
  postgres:
    image: postgres:16
    container_name: pulsar-admin-postgres
    environment:
      POSTGRES_DB: pulsar_admin
      POSTGRES_USER: pulsar
      POSTGRES_PASSWORD: pulsar
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db/init:/docker-entrypoint-initdb.d
  pulsar:
    image: apachepulsar/pulsar:4.1.1
    container_name: pulsar-admin-pulsar
    command: ["bin/pulsar", "standalone"]
    ports:
      - "6650:6650"
      - "8081:8080"
